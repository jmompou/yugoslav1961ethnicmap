<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yugoslavia 1961 Census Map</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div id="map"></div>
    
    <div class="overlay-panel title-panel">
        <h1>SFR Yugoslavia</h1>
        <h2>1961 Census: Majority Ethnicity by Municipality</h2>
        <p>Hover or click on a point to view its exact national composition.</p>
    </div>

    <div class="overlay-panel legend-panel" id="legend">
        <h3>Legend</h3>
        <div id="legend-content"></div>
    </div>

    <!-- Data script generated by Python -->
    <script src="data.js"></script>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="app.js"></script>
</body>
</html>
